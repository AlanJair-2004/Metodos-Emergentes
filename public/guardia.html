<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guardia - Sistema de Acceso Vehicular</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <script src="guardia.js" defer></script>
</head>
<body>
  <header>
    <h1>Panel de Guardia</h1>
    <p>Escaneo de QR para entrada y salida</p>
    <nav class="top-nav">
      <a href="index.html">Administrador</a>
      <a href="guardia.html">Vista Guardia</a>
    </nav>
  </header>

  <main class="grid">
    <section class="card">
      <h2>Escáner QR</h2>
      <div id="reader"></div>
      <button id="startScanBtn">Iniciar cámara</button>
      <button id="stopScanBtn" class="btn-secundario">Detener cámara</button>
      <div id="resultado" class="resultado neutro">Esperando escaneo...</div>
    </section>

    <section class="card full">
      <h2>Historial reciente</h2>
      <button id="refreshBtn">Actualizar historial</button>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Matrícula</th>
              <th>Nombre</th>
              <th>Placas</th>
              <th>Tipo</th>
              <th>Estatus</th>
              <th>Mensaje</th>
              <th>Fecha/Hora</th>
            </tr>
          </thead>
          <tbody id="tablaAccesos"></tbody>
        </table>
      </div>
    </section>
  </main>
</body>
</html>
